name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install Pillow PySide6 PyMuPDF pillow-heif pyinstaller
      - name: GUI-Binary bauen
        run: >
          pyinstaller --noconfirm --onefile --windowed --name PicConverter
          --add-data "assets:assets"
          picconverter_gui.py
      - name: CLI-Binary bauen
        run: >
          pyinstaller --noconfirm --onefile --name picconverter-cli
          picconverter_cli.py
      - name: Archiv erstellen
        run: |
          cd dist
          tar czf PicConverter-${{ github.ref_name }}-linux-x86_64.tar.gz \
            PicConverter picconverter-cli
      - uses: actions/upload-artifact@v7
        with:
          name: linux-build
          path: dist/*.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install Pillow PySide6 PyMuPDF pillow-heif pyinstaller
      - name: GUI-Binary bauen
        run: >
          pyinstaller --noconfirm --onefile --windowed --name PicConverter
          --icon assets/icon.ico
          --add-data "assets;assets"
          picconverter_gui.py
      - name: CLI-Binary bauen
        run: >
          pyinstaller --noconfirm --onefile --name picconverter-cli
          --icon assets/icon.ico
          picconverter_cli.py
      - name: Umbenennen
        run: |
          Move-Item dist/PicConverter.exe dist/PicConverter-${{ github.ref_name }}-windows.exe
          Move-Item dist/picconverter-cli.exe dist/picconverter-cli-${{ github.ref_name }}-windows.exe
      - uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: dist/*.exe

  # Unsigniert (kein Apple-Developer-Zertifikat) — Nutzer heben die
  # Gatekeeper-Quarantäne einmalig auf, siehe README; Runner ist Apple Silicon
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install Pillow PySide6 PyMuPDF pillow-heif pyinstaller
      # .ico wird unter macOS nicht unterstützt; Pillow wandelt das PNG in .icns
      - name: GUI-App bauen
        run: >
          pyinstaller --noconfirm --onefile --windowed --name PicConverter
          --icon assets/icon.png
          --add-data "assets:assets"
          picconverter_gui.py
      - name: CLI-Binary bauen
        run: >
          pyinstaller --noconfirm --onefile --name picconverter-cli
          picconverter_cli.py
      # ditto statt zip, damit die .app-Bundle-Struktur erhalten bleibt
      - name: Archiv erstellen
        run: |
          mkdir staging
          mv dist/PicConverter.app staging/
          mv dist/picconverter-cli staging/
          ditto -c -k staging dist/PicConverter-${{ github.ref_name }}-macos-arm64.zip
      - uses: actions/upload-artifact@v7
        with:
          name: macos-build
          path: dist/*.zip

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist
      - name: GitHub-Release erstellen
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
